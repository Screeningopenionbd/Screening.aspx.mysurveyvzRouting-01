<!DOCTYPE html>
<html>
<head>
  <title>Success | OpenionBD</title>
  <link rel="stylesheet" href="style.css">
  <!-- Redirect after 10 seconds -->
  <meta http-equiv="refresh" content="10;url=https://panelopenionbd.github.io/Surveys/success.html">
</head>
<body>
  <main class="callback">
    <h2 style="color:green;">🎉 Success!</h2>
    <p>You have qualified for the survey.</p>
    <p>You will be redirected to the success page in <span id="countdown">10</span> seconds...</p>
  </main>

  <script>
    let timeLeft = 10;
    const countdownElement = document.getElementById("countdown");
    const timer = setInterval(() => {
      timeLeft--;
      countdownElement.textContent = timeLeft;
      if(timeLeft <= 0) {
        clearInterval(timer);
        window.location.href = "https://panelopenionbd.github.io/Surveys/success.html";
      }
    }, 1000);
  </script>
</body>
</html>
