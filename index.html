<!DOCTYPE html>
<html>
<head>
  <title>Survey Router | OpenionBD</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="callback">
    <h2 id="status">Checking your luck...</h2>
    <p>Redirecting in <span id="countdown">10</span> seconds...</p>
  </main>

  <script>
    // List of surveys
    const surveys = [
      "https://nafiznoobz.questionpro.com/a/TakeSurvey?tt=o7ch8utJsRcECHrPeIW9eQ%3D%3D",
      "https://survey.porsline.com/s/7o0pD7eI",
      "https://surveymars.com/q/ebRDY3u2a",
      "https://www.allcounted.com/s?did=3oamz96fln5oa&lang=en_US",
      "https://screeningopenionbd.github.io/Screening.aspx.id-Kantar.com/"
    ];

    // Randomly decide success or fail
    const lucky = Math.random() < 0.7; // 70% chance success, 30% fail
    let redirectUrl;

    if (lucky) {
      document.getElementById("status").textContent = "✅ You qualify!";
      redirectUrl = surveys[Math.floor(Math.random() * surveys.length)];
    } else {
      document.getElementById("status").textContent = "❌ No survey available!";
      redirectUrl = "fail.html";
    }

    let timeLeft = 10;
    const countdownElement = document.getElementById("countdown");
    const timer = setInterval(() => {
      timeLeft--;
      countdownElement.textContent = timeLeft;
      if (timeLeft <= 0) {
        clearInterval(timer);
        window.location.href = redirectUrl;
      }
    }, 1000);
  </script>
</body>
</html>
